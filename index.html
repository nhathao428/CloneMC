<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloneMC — voxel sandbox</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='7' fill='%236faa3f'/><rect y='7' width='16' height='9' fill='%238a6244'/></svg>">
<style>
  :root {
    --ui-bg: rgba(12, 14, 20, 0.82);
    --ui-border: rgba(255, 255, 255, 0.14);
    --accent: #7fd858;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #e8e8e8; }
  canvas { display: block; }

  /* crosshair */
  #crosshair {
    position: fixed; left: 50%; top: 50%; width: 18px; height: 18px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.85);
    mix-blend-mode: difference;
  }
  #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
  #crosshair::after { left: 0; top: 8px; width: 18px; height: 2px; }

  /* hotbar */
  #hotbar-wrap {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    z-index: 5; pointer-events: none;
  }
  #block-label {
    font-size: 13px; letter-spacing: 0.06em; text-shadow: 0 1px 3px #000;
    background: var(--ui-bg); padding: 2px 10px; border-radius: 4px;
  }
  #hotbar { display: flex; gap: 4px; background: var(--ui-bg); padding: 5px; border-radius: 8px; border: 1px solid var(--ui-border); }
  .slot {
    position: relative; width: 48px; height: 48px; border-radius: 5px;
    border: 2px solid var(--ui-border); display: grid; place-items: center;
    background: rgba(255,255,255,0.04);
  }
  .slot.active { border-color: var(--accent); box-shadow: 0 0 8px rgba(127,216,88,0.5); }
  .slot canvas { image-rendering: pixelated; }
  .slot .num { position: absolute; left: 3px; top: 1px; font-size: 10px; opacity: 0.6; }

  /* debug hud */
  #debug {
    position: fixed; left: 10px; top: 8px; z-index: 5; font-size: 12px;
    font-family: Consolas, monospace; text-shadow: 0 1px 2px #000; opacity: 0.9;
    pointer-events: none;
  }

  /* underwater tint */
  #water-overlay {
    position: fixed; inset: 0; display: none; z-index: 4; pointer-events: none;
    background: rgba(30, 80, 180, 0.35);
  }

  /* start / pause overlay */
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5, 8, 14, 0.72); backdrop-filter: blur(6px);
  }
  #panel {
    width: min(460px, 92vw); background: var(--ui-bg);
    border: 1px solid var(--ui-border); border-radius: 14px;
    padding: 32px 36px; text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  #panel h1 {
    font-size: 44px; letter-spacing: 0.04em; margin-bottom: 2px;
    color: var(--accent); text-shadow: 3px 3px 0 #2c5b1c;
  }
  #panel .sub { font-size: 13px; opacity: 0.65; margin-bottom: 22px; }
  #panel button {
    font-size: 16px; padding: 10px 26px; margin: 4px; cursor: pointer;
    border-radius: 8px; border: 1px solid var(--ui-border);
    background: #2f3542; color: #fff; transition: background 0.15s, transform 0.1s;
  }
  #panel button:hover { background: #3d4557; transform: translateY(-1px); }
  #panel button#play { background: var(--accent); color: #14240c; font-weight: 700; }
  #panel button#play:hover { background: #92e56b; }
  #controls {
    margin-top: 20px; font-size: 12.5px; line-height: 1.9; opacity: 0.8;
    text-align: left; display: inline-block;
  }
  #controls b { color: var(--accent); font-family: Consolas, monospace; }
  #seed-label { margin-top: 14px; font-size: 11px; opacity: 0.45; font-family: Consolas, monospace; }
</style>
<script type="importmap">
{ "imports": { "three": "./lib/three.module.min.js" } }
</script>
</head>
<body>
  <div id="crosshair"></div>
  <div id="water-overlay"></div>
  <div id="debug"></div>

  <div id="hotbar-wrap">
    <div id="block-label"></div>
    <div id="hotbar"></div>
  </div>

  <div id="overlay">
    <div id="panel">
      <h1>CloneMC</h1>
      <div class="sub">voxel sandbox — non-commercial Minecraft-inspired demo</div>
      <button id="play">▶ Chơi</button>
      <button id="new-world">World mới</button>
      <div id="controls">
        <b>WASD</b> di chuyển &nbsp; <b>Space</b> nhảy / bơi lên<br>
        <b>Ctrl</b> chạy nhanh &nbsp; <b>F</b> bay &nbsp; <b>Shift</b> hạ xuống (khi bay)<br>
        <b>Chuột trái</b> đào &nbsp; <b>Chuột phải</b> đặt block &nbsp; <b>Chuột giữa</b> chọn block<br>
        <b>1–9 / lăn chuột</b> đổi block &nbsp; <b>R</b> về spawn &nbsp; <b>Esc</b> tạm dừng
      </div>
      <div id="seed-label"></div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
